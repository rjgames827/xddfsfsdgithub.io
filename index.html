  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TE4NT1V017');

  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // This script checks to see if a redirect is present in the query string,
    // converts it back into the correct url and adds it to the
    // browser's history using window.history.replaceState(...),
    // which will cause the browser to stay on the current page without
    // refreshing the page.
    (function(l) {
      if (l.search[1] === 'p') {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).filter(function(s) {
          return s.slice(0, 2) === 'p='
        })[0].slice(2);
        if (decoded !== l.pathname) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + (l.search.slice(1).split('&').filter(function(s) {
              return s.slice(0, 2) !== 'p='
            }).join('&') ? '?' + l.search.slice(1).split('&').filter(function(s) {
              return s.slice(0, 2) !== 'p='
            }).join('&') : '') + l.hash
          );
        }
      }
    }(window.location))
  </script>
  <style>
    @font-face {
      font-family: 'Swordskull';
      src: url('/fonts/Swordskull_PERSONAL_USE.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: 'Swordskull', 'Inter', sans-serif;
      background-color: #000000;
      color: #fafafa;
      margin: 0;
      padding: 0;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -50px); }
      66% { transform: translate(-20px, 20px); }
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%) skewX(-15deg); }
      100% { transform: translateX(200%) skewX(-15deg); }
    }
    .animate-float {
      animation: float 20s ease-in-out infinite;
    }
    .shimmer-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
      animation: shimmer 3s infinite;
      pointer-events: none;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--surface);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--surface-active);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--surface-hover);
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--surface-hover);
      border-radius: 10px;
    }
  </style>
